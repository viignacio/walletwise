name: Release APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Download & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get latest preview build URL from EAS
        id: eas
        run: |
          eas build:list --platform android --buildProfile preview --limit 1 --json --non-interactive > builds.json
          URL=$(node -p "JSON.parse(require('fs').readFileSync('builds.json','utf8'))[0].artifacts.buildUrl")
          echo "apk_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o walletwise-${{ steps.version.outputs.version }}.apk "${{ steps.eas.outputs.apk_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: WalletWise v${{ steps.version.outputs.version }}
          files: walletwise-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
